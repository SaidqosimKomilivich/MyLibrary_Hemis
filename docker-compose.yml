# ===================================================
# MyLibrary — Docker Compose konfiguratsiyasi
# ===================================================
# Muhim: barcha resurslar (volumes, network) noyob
# nomlar bilan aniqlangan — server dagi boshqa
# loyihalarga ta'sir qilmaydi.
# ===================================================

services:
  db:
    image: postgres:15-alpine
    container_name: kutubxona_db
    env_file:
      - backend/.env
    # XAVFSIZLIK: DB porti tashqariga ochilmaydi (faqat ichki network)
    expose:
      - "5432"
    volumes:
      - kutubxona_bdata:/var/lib/postgresql/data
    networks:
      - kutubxona_net
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kutubxona_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    # XAVFSIZLIK: Backend porti tashqariga ochilmaydi
    # Host Nginx uchun emas — frontend Nginx ichki network orqali proksi qiladi
    expose:
      - "8087"
    volumes:
      - kutubxona_uploads:/app/uploads
    networks:
      - kutubxona_net
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kutubxona_frontend
    depends_on:
      - backend
    # Faqat loopback orqali — host Nginx proksi qiladi
    ports:
      - "127.0.0.1:5176:80"
    volumes:
      - kutubxona_uploads:/app/uploads:ro
    networks:
      - kutubxona_net
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db-backup:
    image: postgres:15-alpine
    container_name: kutubxona_db_backup
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
      - ./backup.sh:/backup.sh
    env_file:
      - backend/.env
    environment:
      PGUSER: postgres
      PGHOST: db
      PGDB: kutubxona_db
    entrypoint: >
      sh -c "chmod +x /backup.sh && echo '0 5 * * 0 /backup.sh' > /etc/crontabs/root && crond -f -l 2"
    networks:
      - kutubxona_net
    restart: always

# ===================================================
# Volumes — noyob nomlar (boshqa loyihalar bilan
# konflikt bo'lmasligi uchun kutubxona_ prefiksi)
# ===================================================
volumes:
  kutubxona_bdata:
  kutubxona_uploads:

# ===================================================
# Network — faqat ushbu loyiha konteynerlari uchun
# izolyatsiyalangan tarmoq
# ===================================================
networks:
  kutubxona_net:
    driver: bridge
