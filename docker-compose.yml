# Production Docker Compose konfiguratsiyasi
# Ishlatish:
#   1. .env.db faylini yarating: echo "DB_PASSWORD=KuchlíParol123" > .env.db
#   2. docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:15-alpine
    container_name: kutubxona_db
    env_file:
      - .env.db              # DB_PASSWORD shu fayldan o'qiladi
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: kutubxona_db
    # XAVFSIZLIK: DB porti tashqariga ochilmaydi (faqat ichki network)
    expose:
      - "5432"
    volumes:
      - bdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kutubxona_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:Farishtam%40localhost@db:5432/kutubxona_db
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    env_file:
      - ./backend/.env
    # XAVFSIZLIK: Backend porti ham faqat ichki network orqali (nginx proksi)
    expose:
      - "8080"
    volumes:
      - app_uploads:/app/uploads
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kutubxona_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - app_uploads:/app/uploads:ro
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db-backup:
    image: postgres:15-alpine
    container_name: kutubxona_db_backup
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
      - ./backup.sh:/backup.sh
    env_file:
      - .env.db              # DB_PASSWORD shu fayldan o'qiladi
    environment:
      PGUSER: postgres
      PGHOST: db
      PGDB: kutubxona_db
    entrypoint: >
      sh -c "chmod +x /backup.sh && echo '0 5 * * 0 /backup.sh' > /etc/crontabs/root && crond -f -l 2"
    restart: always

volumes:
  bdata:
  app_uploads:

