# Nginx default types should be included from parent in /etc/nginx/nginx.conf usually, 
# but if needed, we'll rely on the default.

# Image Caching Setup
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=image_cache:10m max_size=1g inactive=30d use_temp_path=off;

server {
    listen 80;
    # server_name ni serveringiz IP yoki domeniga o'zgartiring:
    # server_name 192.168.1.100;
    # server_name mylibrary.uz www.mylibrary.uz;
    server_name _;

    # MIME types sozlamalari
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # .mjs fayllari uchun kesh sozlamalari
    location ~* \.mjs$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Yuklash hajmi limiti (PDF, rasm yuklash uchun)
    client_max_body_size 50M;

    # Gzip siqish (sahifa tezligi uchun)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Statik fayllar (React/Vite build)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Statik resurslarni kesh qilish
        location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API so'rovlarni backend'ga yo'naltirish
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) uchun buffering'ni o'chirish
        proxy_buffering off;
        proxy_cache off;

        # WebSocket (real-time xabarlar uchun)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout sozlamalari
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Yuklangan fayllar (uploads) proksi: UMUMIY qoidalar
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # JWT cookie'ni va Auth header'ni backend'ga o'tkazish
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Authorization;

        # Odatiy uploads (PDF/Audio) kesh qilinmaydi, faqat proksi orqali utadi
        proxy_cache off;
    }

    # Aynan "images" papkasi uchun kesh (Ruxsatsiz hammaga ochiq)
    location /uploads/images/ {
        proxy_pass http://backend:8080/uploads/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_cache image_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Faylni yuklab olinishiga yo'l qo'ymaslik
    add_header Content-Disposition "inline" always;

    # Xavfsizlik sarlavhalari (Security Headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy (connect-src blob: ruxsat etiladi React-PDF uchun)
    add_header Content-Security-Policy "default-src 'self' blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' blob: data: https://unpkg.com; media-src 'self' blob:; worker-src 'self' blob: https://unpkg.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Internal mapping for X-Accel-Redirect from backend (faqat backend dan kelgan rasmlar uchun edi)
    location /internal_uploads/ {
        internal;
        alias /app/uploads/;
    }
}
