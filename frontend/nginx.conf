types {
    # .mjs fayllar JavaScript module script sifatida yuklanishi uchun
    application/javascript  js mjs;
    text/css                css;
    image/png               png;
    image/jpeg              jpeg jpg;
    image/gif               gif;
    image/svg+xml           svg svgz;
    image/webp              webp;
    image/x-icon            ico;
    font/woff               woff;
    font/woff2              woff2;
    application/pdf         pdf;
    text/html               html htm;
    text/plain              txt;
}

server {
    listen 80;
    # server_name ni serveringiz IP yoki domeniga o'zgartiring:
    # server_name 192.168.1.100;
    # server_name mylibrary.uz www.mylibrary.uz;
    server_name _;

    # Yuklash hajmi limiti (PDF, rasm yuklash uchun)
    client_max_body_size 50M;

    # Gzip siqish (sahifa tezligi uchun)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Statik fayllar (React/Vite build)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Statik resurslarni kesh qilish
        location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API so'rovlarni backend'ga yo'naltirish
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) uchun buffering'ni o'chirish
        proxy_buffering off;
        proxy_cache off;

        # WebSocket (real-time xabarlar uchun)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout sozlamalari
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Yuklangan fayllar (uploads) uchun proksi
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # JWT cookie'ni backend'ga uzatish uchun (PDF autentifikatsiyasi)
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Authorization;
    }
}
